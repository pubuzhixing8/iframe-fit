<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>iframe-fit demo</title>
    <meta name="description" content="iFrame message passing test" />
    <meta name="viewport" content="width=device-width" />
    <style>
      a.toggle {
        float: right;
        margin-left: 8px;
      }

      iframe {
        height: 300px;
        /* border-width: 0; */
      }

    </style>
  </head>

  <body>
    <a href="#" id="toggle" class="toggle">Toggle iFrame</a>
    <h2>Auto resizing iFrame</h2>
    <p>
      Back to
      <a name="anchorParentTest" href="index.html">vertical iframes</a>.
    </p>
    
    <div id="iframeContainer" style="margin: 20px">
      <iframe
        src="child/frame.animate-width.html"
        data-iframe-fit-resize-width="true"
        scrolling="no"
      ></iframe>
    </div>

    <p id="callback"></p>
    <div style="margin: 8px 0; font-size: 13px">
      For details on how this works, see <a href="../README.md">README</a>.
    </div>

    <script type="module">
      import { iframeFit } from '../dist/parent/index.mjs'

      const iframe = document.querySelector('#iframeContainer iframe')
      iframeFit(iframe)

      function toggle() {
        const iframes = document.querySelectorAll('iframe')
        const first = iframes[0]

        first.style.display = first.style.display === 'none' ? 'block' : 'none'
      }

      document.getElementById('toggle').addEventListener('click', toggle)
    </script>
  </body>
</html>
