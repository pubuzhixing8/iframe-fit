<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>iframe-fit demo</title>
    <meta name="description" content="iFrame message passing test" />
    <meta name="viewport" content="width=device-width" />
    <style>
      a.toggle {
        float: right;
        margin-left: 8px;
      }

      #callback {
        margin: -5px 0 5px 24px;
      }

      iframe {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <a href="#" id="toggle" class="toggle">Toggle iFrame</a>
    <h2>Auto resizing iFrame</h2>
    <p>
      Resize window or click one of the links in the iFrame to watch it resize.
      Or try with <a name="anchorParentTest" href="two.html">two iFrames</a>.
    </p>

    <div id="iframeContainer" style="margin: 20px">
      <iframe src="child/frame.content.html" scrolling="no"></iframe>
    </div>

    <p id="callback"></p>
    <div style="margin: 8px 0 0 24px; font-size: 13px">
      For details on how this works, see <a href="../README.md">README</a>.
    </div>

    <script type="module">
      import { bootstrapIframeResize } from '../dist/parent/index.mjs'

      const iframe = document.querySelector('#iframeContainer iframe')
      bootstrapIframeResize(iframe)

      function toggle(event) {
        event.preventDefault()
        const iframes = document.querySelectorAll('iframe')
        const first = iframes[0]
        first.style.display = first.style.display === 'none' ? 'block' : 'none'
      }

      document.getElementById('toggle').addEventListener('click', toggle)
    </script>
  </body>
</html>
