<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>iframe-fit demo</title>
    <meta name="description" content="iframe-fit demo content" />
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <style>
      *,
      *:before,
      *:after {
        box-sizing: border-box;
      }
      a {
        float: right;
        margin-left: 10px;
      }

      h2 {
        margin-top: 0;
      }
      body {
        margin: 8px !important;
      }
    </style>
  </head>

  <body>
    <a href="frame.content.html">Back to page 1</a>
    <h2>Nested iFrame</h2>
    <p>
      Resize window or click one of the links in the nested iFrame to watch it
      resize.
    </p>
    <div style="margin:20px;">
      <iframe
        id="nestedIFrame"
        src="frame.content.html"
        width="100%"
        scrolling="no"
      ></iframe>
    </div>
    <p id="callback"></p>

    <script type="module">
      import { bootstrapIframeResize } from '../../dist/parent/index.mjs'
      import { bootstrapChild } from '../../dist/child/index.mjs'

      bootstrapChild()

      const level = document.location.search.replace(/\?/, '') || 0
      const id = `nestedIFrame${level}`
      const iframe = document.getElementById('nestedIFrame')

      iframe.setAttribute('id', id)
      iframe.setAttribute('src', `frame.content.html?${level}`)

      bootstrapIframeResize(iframe)
    </script>
  </body>
</html>
