<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>iframe-fit demo</title>
    <meta name="description" content="iFrame message passing test" />
    <meta name="viewport" content="width=device-width" />
    <style>
      iframe {
        width: 48%;
        height: 100vh;
        /* border-width: 0; */
      }
    </style>
  </head>

  <body>
    <h2>Auto resizing iFrame</h2>
    <p>
      Resize window or click one of the links in the iFrame to watch it resize.
      Or go back to a
      <a name="anchorParentTest" href="index.html">single iFrame</a>.
    </p>
    <div style="margin: 20px; overflow: auto">
      <iframe
        src="child/frame.content.html"
        scrolling="no"
        style="float: left; margin-right: 2%"
      ></iframe>
      <iframe
        src="child/frame.content.html"
        scrolling="no"
      ></iframe>
    </div>

    <p id="callback"></p>
    <div style="margin: 8px 0; font-size: 13px">
      For details on how this works, see <a href="../README.md">README</a>.
    </div>

    <script type="module">
      import { bootstrapIframeResize } from '../dist/parent/index.mjs'

      document.querySelectorAll('iframe').forEach((iframe) => bootstrapIframeResize(iframe))
    </script>
  </body>
</html>
