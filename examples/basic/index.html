<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iframe-fit basic</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        margin: 24px;
      }
      iframe {
        width: 100%;
        border: 1px solid #d0d7de;
        border-radius: 8px;
      }
      .layout {
        display: grid;
        gap: 16px;
        max-width: 900px;
      }
      .card {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 16px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="card">
        <div>Parent page</div>
      </div>
      <iframe id="demo-iframe" src="./child.html"></iframe>
    </div>

    <script type="module">
      import { iframeFit } from '../../dist/parent/index.mjs'

      const iframe = document.getElementById('demo-iframe')
      iframeFit(iframe)
    </script>
  </body>
</html>
