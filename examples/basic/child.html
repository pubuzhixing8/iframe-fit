<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iframe-fit child</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        margin: 16px;
      }
      button {
        border: 1px solid #d0d7de;
        background: #fff;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
      }
      .stack {
        display: grid;
        gap: 12px;
      }
      .box {
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div class="box">Child page</div>
      <button id="add">Add content</button>
      <div id="content" class="stack"></div>
    </div>

    <script type="module">
      import { bootstrapChild } from '../../dist/child/index.mjs'

      bootstrapChild()

      const content = document.getElementById('content')
      const add = document.getElementById('add')
      let count = 0
      add.addEventListener('click', () => {
        count += 1
        const el = document.createElement('div')
        el.className = 'box'
        el.textContent = `Line ${count}`
        content.appendChild(el)
      })
    </script>
  </body>
</html>
